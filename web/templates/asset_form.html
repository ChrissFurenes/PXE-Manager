<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{if .IsEdit}}Edit Asset{{else}}Upload Asset{{end}}</title>
</head>
<body>
<h1>{{if .IsEdit}}Edit Asset{{else}}Upload Asset{{end}}</h1>

<form method="post" action="{{if .IsEdit}}/admin/assets/edit?id={{.Asset.ID}}{{else}}/admin/assets/new{{end}}" {{if not .IsEdit}}enctype="multipart/form-data"{{end}}>
    <p>
        <label>Name</label><br>
        <input type="text" name="name" required value="{{if .Asset}}{{.Asset.Name}}{{end}}">
    </p>

    <p>
        <label>Type</label><br>
        <select name="file_type">
            <option value="iso" {{if and .Asset (eq .Asset.FileType "iso")}}selected{{end}}>ISO</option>
            <option value="img" {{if and .Asset (eq .Asset.FileType "img")}}selected{{end}}>IMG</option>
            <option value="kernel" {{if and .Asset (eq .Asset.FileType "kernel")}}selected{{end}}>Kernel</option>
            <option value="initrd" {{if and .Asset (eq .Asset.FileType "initrd")}}selected{{end}}>Initrd</option>
            <option value="other" {{if or (not .Asset) (eq .Asset.FileType "other")}}selected{{end}}>Other</option>
        </select>
    </p>

    <p>
        <label>Description</label><br>
        <input type="text" name="description" style="width: 500px;" value="{{if .Asset}}{{.Asset.Description}}{{end}}">
    </p>

    {{if not .IsEdit}}
    <p>
        <label>File</label><br>
        <input type="file" name="file" required>
    </p>
    {{else}}
    <p>
        <strong>File:</strong> {{.Asset.FileName}}<br>
        <strong>Path:</strong> {{.Asset.FilePath}}<br>
        <strong>Size:</strong> {{.Asset.SizeBytes}}
    </p>
    {{end}}

    <p>
        <button type="submit">{{if .IsEdit}}Save changes{{else}}Upload{{end}}</button>
    </p>
</form>

<p><a href="/admin/assets">Back</a></p>
</body>
</html>
